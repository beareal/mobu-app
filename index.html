<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>モブ君アプリ</title>
    <!-- CSSファイルを読み込み -->
    <link rel="stylesheet" href="style-base.css">
    <link rel="stylesheet" href="style-screens.css">
</head>
<body>
    <!-- 動画による瞬き演出オーバーレイ -->
    <div id="video-overlay">
        <!-- muted playsinline は自動再生に必須 -->
        <video id="blink-video" src="assets/blink_transition.mp4" muted playsinline></video>
    </div>
    <!-- A-1: ウェルカム画面 -->
    <div id="screen-welcome" class="screen active">
        <div class="welcome-content">
            <h1>モブ君アプリ</h1>
            <p>画面をタップしてスタート</p>
        </div>
    </div>
    <!-- A-2: 名前入力画面 -->
    <div id="screen-name" class="screen">
        <div class="container">
            <h2>あなたのニックネームを教えてください</h2>
            <input type="text" id="nickname-input" placeholder="ニックネーム（最大10文字）">
            <p class="error-message" id="error-message"></p>
            <button class="btn-primary">次へ</button>
        </div>
    </div>
    <!-- A-3: タスク選択画面 -->
    <div id="screen-task-select" class="screen">
        <div class="container">
            <h2>あなたの目標を3つ選んでください</h2>
            <div class="task-list">
                <div class="task-chip">
                    <input type="checkbox" id="task1">
                    <label for="task1">タスク1</label>
                </div>
                <div class="task-chip">
                    <input type="checkbox" id="task2">
                    <label for="task2">タスク2</label>
                </div>
                <div class="task-chip">
                    <input type="checkbox" id="task3">
                    <label for="task3">タスク3</label>
                </div>
            </div>
            <button class="btn-primary" disabled>これで決定</button>
        </div>
    </div>
    <!-- B-1: ホーム画面 -->
    <div id="screen-home" class="screen">
        <div class="container">
            <p class="guide-text">今日完了したタスクにチェックを入れてください</p>
            <div class="task-list">
                <div class="task-chip-home">
                    <input type="checkbox" id="home-task1">
                    <label for="home-task1">タスク1</label>
                </div>
                <div class="task-chip-home">
                    <input type="checkbox" id="home-task2">
                    <label for="home-task2">タスク2</label>
                </div>
                <div class="task-chip-home">
                    <input type="checkbox" id="home-task3">
                    <label for="home-task3">タスク3</label>
                </div>
            </div>
            <button class="btn-primary" disabled>完了</button>
            <div class="calendar-placeholder">
                <p>カレンダー(後で実装)</p>
            </div>
        </div>
    </div>
    <!-- B-2: タスク報告画面（画像実装版） -->
    <div id="screen-report" class="screen screen-full">
        <img src="assets/bg_report.png" alt="背景" class="bg-full">
        <div class="thought-bubble-container">
            <p id="report-thought-text" class="thought-text">よし、完了！モブ君に報告しよっと♪</p>
            <div id="report-selection-area" style="display: none;"></div>
        </div>
    </div>
    <!-- C-1: カフェ画面 -->
    <div id="screen-cafe" class="screen screen-full">
        <div class="cafe-bg-placeholder"></div>
        <div class="dialogue-container">
            <p class="dialogue-text">（モブ君のセリフがここに表示されます）</p>
        </div>
    </div>
    <!-- C-2: LINE画面 -->
    <div id="screen-line" class="screen">
        <div class="line-container">
            <div class="line-header">
                <img src="assets/icon_back_24.svg" alt="戻る">
                <span>モブ君</span>
            </div>
            <div class="line-chat">
                
            </div>
            <!-- ★★★ 変更点：入力エリアの構造を変更 ★★★ -->
            <div class="line-input-area">
                <!-- 普段表示される偽の入力バー -->
                <div id="line-input-bar">
                    <p>(入力エリア)</p>
                </div>
                <!-- 気分共有の時に表示されるスタンプ選択エリア -->
                <div id="mood-stamp-selector" style="display: none;">
                    <button class="mood-stamp">静か</button>
                    <button class="mood-stamp">元気</button>
                    <button class="mood-stamp">頑張った</button>
                    <button class="mood-stamp">しんどい</button>
                    <button class="mood-stamp">不安</button>
                    <button class="mood-stamp">嬉しい</button>
                </div>
            </div>
        </div>
    </div>

    <!-- D-3: スタッフロール画面 -->
    <div id="screen-staff-roll" class="screen screen-full">
        <div class="staff-roll-container">
            <div class="staff-roll-content">
                <p>企画・開発</p>
                <p class="staff-name">なつき</p>
                
                <p>制作理念</p>
                <p class="staff-name">（ここに理念を記載）</p>

                <p>AI協力</p>
                <p class="staff-name">Claude, ChatGPT, Gemini</p>
                
                <p>Special Thanks</p>
                <p class="staff-name">あなた</p>
            </div>
        </div>
        <div class="fin-container">
            <p class="fin-text">Fin</p>
            <button id="restart-button" class="btn-primary">今度はどんな私に会えるかな?</button>
        </div>
    </div>

    <!-- JavaScriptファイルを読み込み -->
    <script src="logic-state.js"></script>
    <script src="logic-router.js"></script>
    <script src="main.js"></script>
</body>
</html>
